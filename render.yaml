services:
  - type: web
    name: vehicle-maintenance
    runtime: node
    region: oregon
    repo: https://github.com/sandholmkurt-ctrl/Sandbox.git
    branch: main
    autoDeploy: true
    rootDir: server
    buildCommand: bash build.sh
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVER_ROOT
        value: /opt/render/project/src/server
      - key: DATABASE_URL
        fromDatabase:
          name: vehicle-maintenance-db
          property: connectionString
      - key: NPM_CONFIG_INCLUDE
        value: dev

databases:
  - name: vehicle-maintenance-db
    region: oregon
    plan: free
